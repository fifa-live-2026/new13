    <!-- এখানে <meta http-equiv="refresh"> কেটে দেওয়া হয়েছে যাতে বট রিডাইরেক্ট না হতে পারে -->
</head>
<body>

    <div style="text-align: center; margin-top: 50px; font-family: Arial, sans-serif;">
        <h2>Redirecting to Live Match...</h2>
        <p>Please wait a few seconds.</p>
        <p>If you are not redirected, <a href="https://py.md/ArSyR">click here</a>.</p>
    </div>

    <script>
        // ফেসবুক বা হোয়াটসঅ্যাপের বট বা স্ক্র্যাপার রিডাইরেক্ট করা থেকে আটকানোর জন্য ট্রিক
        const userAgent = navigator.userAgent.toLowerCase();
        const isBot = /facebookexternalhit|facebookplatform|whatsapp|twitterbot|telegrambot/i.test(userAgent);

        // ইউজার যদি আসল মানুষ হয়, তবে ৩ সেকেন্ড পর রিডাইরেক্ট হবে
        // আর ফেসবুক/হোয়াটসঅ্যাপের রোবট হলে রিডাইরেক্ট হবে না, ফলে প্রিভিউ সঠিক দেখাবে
        if (!isBot) {
            setTimeout(function () {
                window.location.href = "https://py.md/ArSyR";
            }, 3000); // ৩ সেকেন্ড পর রিডাইরেক্ট
        }
    </script>

</body>
